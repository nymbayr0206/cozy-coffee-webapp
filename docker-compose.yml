services:
  cozy-coffee-kass:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cozy-coffee-kass
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      KASS_STORE_PATH: /app/data/kass-store.json
    volumes:
      - ./data:/app/data
